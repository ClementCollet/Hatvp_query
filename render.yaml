services:
  - type: web
    name: hatvp-explorer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: hatvp-cache
      mountPath: /tmp/hatvp_cache
      sizeGB: 1
